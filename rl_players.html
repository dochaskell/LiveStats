<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket League Player Slideshow</title>
  <style>
    :root {
      --bg1: #0d1b2a;
      --bg2: #1b263b;
      --accent: #e9dcc0;
      --accent-strong: #ffffff;
      --text: #f5f4ef;
      --muted: rgba(255,255,255,0.82);
      --gold: #f0dfbb;
      --panel: rgba(11, 23, 43, 0.78);
      --panel-edge: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.36);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      background: #111;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,0.08), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      box-shadow: 0 40px 120px rgba(0,0,0,0.5);
      transition: width .6s ease, height .6s ease;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 20px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 17px);
      opacity: .32;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0 72%, rgba(255,255,255,0.06) 72% 100%);
      pointer-events: none;
    }

    .frame.landscape {
      width: 1920px;
      height: 1080px;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.035);
      transition: opacity .75s ease, transform .75s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .slide-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.22)),
        linear-gradient(90deg, transparent 0 38%, rgba(6,13,24,0.1) 38% 100%);
    }

    .layout {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-rows: 44% 56%;
      z-index: 1;
    }

    .frame.landscape .layout {
      grid-template-columns: 44% 56%;
      grid-template-rows: 1fr;
    }

    .photo-panel {
      position: relative;
      overflow: hidden;
    }

    .player-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      transform: scale(1.04);
      transition: transform 10s ease;
      filter: contrast(1.04) saturate(1.02);
    }

    .slide.active .player-photo {
      transform: scale(1.12);
    }

    .photo-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.04), transparent 28%, rgba(0,0,0,0.32) 100%),
        linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.14));
    }

    .school-chip {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: rgba(8,12,20,0.34);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.2);
      z-index: 2;
    }

    .school-chip img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 6px;
    }

    .school-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .school-name {
      font-size: 1.5rem;
      letter-spacing: .04em;
    }

    .school-mascot {
      margin-top: 5px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      font-size: .84rem;
      color: rgba(255,255,255,0.74);
      letter-spacing: .12em;
    }

    .content-panel {
      position: relative;
      padding: 42px 44px 44px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: linear-gradient(180deg, rgba(5,11,22,0.08), rgba(5,11,22,0.22));
    }

    .frame.landscape .content-panel {
      justify-content: center;
      padding: 34px 42px 36px;
      gap: 14px;
    }

    .title-block {
      position: relative;
      padding-right: 118px;
    }

    .rank-pill {
      position: absolute;
      top: 4px;
      right: 0;
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: .08em;
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
    }

    .gamer-tag {
      font-size: clamp(4.8rem, 10vw, 7rem);
      line-height: .92;
      letter-spacing: .03em;
      text-transform: uppercase;
      text-shadow: 0 8px 20px rgba(0,0,0,0.26);
      max-width: 100%;
      word-break: break-word;
    }

    .irl-name {
      margin-top: 10px;
      font-size: clamp(1.8rem, 3vw, 2.45rem);
      line-height: 1.04;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .02em;
    }

    .subline {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .92rem;
      color: rgba(255,255,255,0.86);
    }

    .subline .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .divider {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), rgba(255,255,255,0.34));
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      margin-bottom: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .frame.landscape .stats {
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
    }

    .stat-card {
      position: relative;
      overflow: hidden;
      min-height: 106px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid var(--panel-edge);
      border-radius: 0;
      box-shadow: 0 16px 30px rgba(0,0,0,0.24);
      transform: translateX(28px);
      opacity: 0;
    }

    .frame.landscape .stat-card {
      min-height: 94px;
    }

    .slide.active .stat-card {
      transform: translateX(0);
      opacity: 1;
      transition: transform .55s ease, opacity .55s ease;
    }

    .slide.active .stat-card:nth-child(1) { transition-delay: .06s; }
    .slide.active .stat-card:nth-child(2) { transition-delay: .12s; }
    .slide.active .stat-card:nth-child(3) { transition-delay: .18s; }
    .slide.active .stat-card:nth-child(4) { transition-delay: .24s; }
    .slide.active .stat-card:nth-child(5) { transition-delay: .30s; }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent 36%);
      pointer-events: none;
      z-index: 2;
    }

    .stat-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, var(--bar1), var(--bar2));
      opacity: .56;
      transition: width 1.1s cubic-bezier(.2,.8,.2,1);
      z-index: 0;
    }

    .slide.active .stat-fill {
      width: var(--fill);
    }

    .stat-row {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 106px;
      padding: 0 26px;
      gap: 20px;
    }

    .frame.landscape .stat-row {
      min-height: 94px;
      padding: 0 22px;
    }

    .stat-label {
      font-size: 3.8rem;
      line-height: 1;
      letter-spacing: .05em;
      text-transform: uppercase;
      text-shadow: 0 4px 12px rgba(0,0,0,0.16);
      font-weight: 900;
    }

    .frame.landscape .stat-label {
      font-size: 1.7rem;
    }

    .stat-value {
      font-size: 4.2rem;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 6px 16px rgba(0,0,0,0.3);
      white-space: nowrap;
      font-weight: 900;
    }

    .frame.landscape .stat-value {
      font-size: 3.35rem;
    }

    .footer {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0;
      padding: 18px 20px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }

    .info-label {
      font-size: .94rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
    }

    .info-value {
      font-size: 1.45rem;
      line-height: 1.08;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      color: var(--text);
      word-break: break-word;
    }

    .corner-logo {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 142px;
      height: 142px;
      background: linear-gradient(135deg, rgba(255,255,255,0.94) 0 48%, rgba(235,235,235,0.98) 100%);
      clip-path: polygon(36% 0, 100% 0, 100% 100%, 0 100%);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 18px 16px 14px 18px;
      box-shadow: -20px -16px 40px rgba(0,0,0,0.22);
      border-top: 8px solid var(--accent);
      z-index: 3;
    }

    .corner-logo img {
      width: 82px;
      height: 82px;
      object-fit: contain;
    }

    .frame.landscape .corner-logo {
      width: 124px;
      height: 124px;
      padding: 14px 12px 12px 16px;
    }

    .frame.landscape .corner-logo img {
      width: 72px;
      height: 72px;
    }

    .helper {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 4;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      letter-spacing: .08em;
      color: rgba(255,255,255,0.56);
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <div class="frame" id="frame">
    <div id="slides"></div>
    <div class="helper">F = flip layout</div>
  </div>

<script>
const schools = {
  "Baylor": { mascot: "Bears", logo: "https://1000logos.net/wp-content/uploads/2019/10/Baylor-Bears-Logo-2005.png", primary: "#154734", secondary: "#FFB81C" },
  "Boise State": { mascot: "Broncos", logo: "https://i.ibb.co/b5RrmZ8/622px-Boise-State-B-logo-svg.png", primary: "#0033A0", secondary: "#D64309" },
  "Kansas": { mascot: "Jayhawks", logo: "https://i.imgur.com/kGTzDxn.png", primary: "#0051BA", secondary: "#E8000D" },
  "Michigan State": { mascot: "Spartans", logo: "https://logos-download.com/wp-content/uploads/2017/11/Michigan_State_University_logo.png", primary: "#18453B", secondary: "#FFFFFF" },
  "Minnesota": { mascot: "Golden Gophers", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Minnesota_Golden_Gophers_logo.svg/2560px-Minnesota_Golden_Gophers_logo.svg.png", primary: "#5f0b2f", secondary: "#fabd22" },
  "Nebraska": { mascot: "Huskers", logo: "https://i.imgur.com/1WAoycz.png", primary: "#000000", secondary: "#D00000" },
  "Ohio State": { mascot: "Buckeyes", logo: "https://i.ibb.co/9sL5wT1/Ohio-State.png", primary: "#bb0000", secondary: "#666666" },
  "Syracuse": { mascot: "Orange", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Syracuse_Orange_logo.svg/1200px-Syracuse_Orange_logo.svg.png", primary: "#F76900", secondary: "#FFFFFF" },
  "Utah": { mascot: "Utes", logo: "https://upload.wikimedia.org/wikipedia/commons/5/53/Utah_Utes_primary_logo.svg", primary: "#BE0000", secondary: "#FFFFFF" }
};

const players = [
  ["Kelpy","Kelsan Chisholm","Utah","4-14",33,22,79,108,40,"Computer Engineering","https://i.ibb.co/rfbNGKVT/Utah-Kelpy-RL.png"],
  ["BranJ","Bransen Jorgensen","Utah","4-14",32,24,63,105,57,"Undeclared","https://i.ibb.co/2YnBmy7Y/Utah-Branj-RL.png"],
  ["Hydro","Trey Johnson","Utah","4-14",9,10,25,40,16,"Earth Science","https://i.ibb.co/dJBZwDw8/Utah-Hyrdo-RL.png"],
  ["S3TH","Seth Rushton","Utah","4-14",7,7,12,17,6,"Mechanical Engineering","https://i.ibb.co/Gvtyq3D2/Utah-Seth.png"],
  ["LlessuR","Matthew Russell","Syracuse","13-5",39,17,39,109,105,"Undeclared","https://i.imgur.com/bo8COEg.png"],
  ["TIZRL","Alex Ortiz-Rosado","Syracuse","13-5",34,26,60,115,23,"Undeclared","https://i.imgur.com/89g85Mq.png"],
  ["Gababy","Gabriel Goodwin","Syracuse","13-5",24,37,55,94,69,"Business management","https://i.imgur.com/VngrJMN.png"],
  ["gaines","Ilhan Ozdil","Ohio State","8-10",39,31,78,140,66,"Undeclared","https://i.ibb.co/N6rDmdxc/OSU-Rocket-League-Gaines02.png"],
  ["Bungo","Andrew Nikolai","Ohio State","8-10",35,27,76,145,26,"Undeclared","https://i.ibb.co/M5CxLqQb/Rocket-League-Bungo02.png"],
  ["danwad","Nick Danforth","Ohio State","8-10",22,18,35,70,22,"Undeclared","https://i.ibb.co/WN9Vfnjg/Rocket-League-Danwad02.png"],
  ["CJ","Christopher Wood","Ohio State","8-10",18,13,30,58,35,"Undeclared","-"],
  ["Mintzy","Kade Wickham","Nebraska","6-12",41,27,79,118,65,"Marketing and Management","https://i.imgur.com/tvLX9G0.png"],
  ["creedrl","Hugh Strumberger","Nebraska","6-12",34,32,69,134,44,"Computer Science","https://i.imgur.com/kHIdwQh.png"],
  ["Promising RL","Benjamin Priest","Nebraska","6-12",27,26,90,104,48,"Accounting","https://i.imgur.com/siZ25YV.jpeg"],
  ["CyanDelta","Brody Knaak","Nebraska","6-12",2,1,3,4,8,"Viola Performance / Mechanical Engineering","https://i.imgur.com/j2y0GKc.png"],
  ["Rad","Braden Raddatz","Minnesota","5-13",38,20,73,119,75,"Mechanical Engineering","https://i.imgur.com/c0zCMwA.png"],
  ["WarPai","Adan Alatoma","Minnesota","5-13",30,18,91,118,44,"Aerospace Engineering","https://i.imgur.com/Edzai4k.png"],
  ["mralexplas","Alex Pupp","Minnesota","5-13",20,20,50,60,67,"Computer science","https://i.ibb.co/5WzfvLJf/RAD-braden-raddatz.png"],
  ["Alphy1","Alphonce Ayega","Minnesota","5-13",9,4,25,22,7,"Computer Science","https://i.imgur.com/QE9we8n.png"],
  ["opp_bomb","Connor Neiheisel","Michigan State","14-4",40,16,44,125,80,"Computer Science","https://i.imgur.com/JEhBzqK.png"],
  ["Morveu","Christian Riegert","Michigan State","14-4",27,30,41,95,34,"Digital Storytelling","https://i.imgur.com/J24vIrn.png"],
  ["nock","Nicholas Dowdican","Michigan State","14-4",21,18,36,67,45,"Finance","https://i.ibb.co/SRRZf8v/Nock.png"],
  ["Druee","Andrew Prill","Michigan State","14-4",12,12,24,48,19,"-","-"],
  ["sibs","Sahib Dhillon","Michigan State","14-4",5,5,12,13,12,"-","-"],
  ["Alpacca","Kyle Maddox","Kansas","7-11",27,21,42,83,62,"Mechanical Engineering","https://i.imgur.com/zsZoRff.png"],
  ["meve","Maddox Stueve","Kansas","7-11",24,18,71,84,25,"Business","https://i.imgur.com/MvstQiK.png"],
  ["Swift","Landon Swift","Kansas","7-11",19,19,44,75,55,"Psychology","https://i.imgur.com/isAKpTy.png"],
  ["durtho","Emiliano Flores","Boise State","15-3",69,39,72,205,56,"Health Studies","https://i.imgur.com/5rPBia8.png"],
  ["WUZYWRLD","Cade Hall","Boise State","15-3",64,43,71,212,73,"Psychology","https://i.imgur.com/QehceP8.png"],
  ["prstn","Preston Ferrante","Boise State","15-3",52,58,77,169,51,"Business","https://i.imgur.com/Hmi9f4W.png"],
  ["Andy","Andrew Nolan","Baylor","18-0",58,44,71,144,38,"Accounting","https://i.imgur.com/LV3CERv.png"],
  ["hockser","Colby James","Baylor","18-0",46,40,51,131,48,"Mechanical Engineering","https://i.imgur.com/Ka2svlb.png"],
  ["jt25rl","Joseph Tornari","Baylor","18-0",26,19,14,71,44,"-","https://i.ibb.co/CKx6Pt4j/si-Z25-YV-no-bg-c4csio0k.png"],
  ["Zineel","Kadin Zineelabidine","Baylor","18-0",14,15,13,47,16,"Undeclared","https://i.imgur.com/YZRyqZg.png"]
].map(p => ({
  gamerTag: p[0],
  irlName: p[1],
  school: p[2],
  record: p[3],
  goals: p[4],
  assists: p[5],
  saves: p[6],
  shots: p[7],
  demos: p[8],
  major: p[9],
  img: p[10]
}));

players.sort((a, b) => b.goals - a.goals || b.assists - a.assists);

const maxBySchool = {};
players.forEach(p => {
  if (!maxBySchool[p.school]) maxBySchool[p.school] = { goals: 0, assists: 0, saves: 0, shots: 0, demos: 0 };
  maxBySchool[p.school].goals = Math.max(maxBySchool[p.school].goals, p.goals);
  maxBySchool[p.school].assists = Math.max(maxBySchool[p.school].assists, p.assists);
  maxBySchool[p.school].saves = Math.max(maxBySchool[p.school].saves, p.saves);
  maxBySchool[p.school].shots = Math.max(maxBySchool[p.school].shots, p.shots);
  maxBySchool[p.school].demos = Math.max(maxBySchool[p.school].demos, p.demos);
});

function pct(value, max) {
  if (!max) return "0%";
  return Math.max(8, Math.round((value / max) * 100)) + "%";
}

function fallbackImage(player, school) {
  return !player.img || player.img === "-" ? school.logo : player.img;
}

function stat(label, value, fill, primary, secondary) {
  return `<div class="stat-card">
    <div class="stat-fill" style="--fill:${fill};--bar1:${primary};--bar2:${secondary}"></div>
    <div class="stat-row">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>
  </div>`;
}

function slide(player, index) {
  const school = schools[player.school];
  const max = maxBySchool[player.school];
  const photo = fallbackImage(player, school);
  return `
    <section class="slide" style="--bg1:${school.primary};--bg2:${school.primary};--accent:${school.secondary};--accent-strong:${school.secondary};">
      <div class="slide-bg"></div>
      <div class="layout">
        <div class="photo-panel">
          <img class="player-photo" src="${photo}" alt="${player.gamerTag}" onerror="this.onerror=null;this.src='${school.logo}'" />
          <div class="school-chip">
            <img src="${school.logo}" alt="${player.school} logo" />
            <div class="school-text">
              <div class="school-name">${player.school}</div>
              <div class="school-mascot">${school.mascot}</div>
            </div>
          </div>
        </div>
        <div class="content-panel">
          <div class="title-block">
            <div class="rank-pill">Rank #${index + 1}</div>
            <div class="gamer-tag">${player.gamerTag}</div>
            <div class="irl-name">${player.irlName}</div>
            <div class="subline">
              <span>${player.record} record</span>
              <span class="dot"></span>
              <span>${player.major === '-' ? 'Major Undisclosed' : player.major}</span>
            </div>
          </div>

          <div class="divider"></div>

          <div class="stats">
            ${stat("Goals", player.goals, pct(player.goals, max.goals), school.primary, school.secondary)}
            ${stat("Assists", player.assists, pct(player.assists, max.assists), school.primary, school.secondary)}
            ${stat("Saves", player.saves, pct(player.saves, max.saves), school.primary, school.secondary)}
            ${stat("Shots", player.shots, pct(player.shots, max.shots), school.primary, school.secondary)}
            ${stat("Demos", player.demos, pct(player.demos, max.demos), school.primary, school.secondary)}
          </div>

          <div class="footer">
            <div class="info-box">
              <div class="info-label">Major</div>
              <div class="info-value">${player.major === '-' ? 'Undisclosed' : player.major}</div>
            </div>
            <div class="info-box">
              <div class="info-label">Team Record</div>
              <div class="info-value">${player.record}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="corner-logo">
        <img src="${school.logo}" alt="${player.school} logo" />
      </div>
    </section>`;
}

const container = document.getElementById("slides");
container.innerHTML = players.map(slide).join("");
const slides = [...document.querySelectorAll(".slide")];
let current = 0;
let timer = null;

function show(n) {
  slides.forEach((s, idx) => s.classList.toggle("active", idx === n));
  current = n;
}

function next() {
  show((current + 1) % slides.length);
}

function startRotation() {
  clearInterval(timer);
  timer = setInterval(next, 10000);
}

show(0);
startRotation();

document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "f") {
    document.getElementById("frame").classList.toggle("landscape");
  }
  if (e.key === "ArrowRight") {
    next();
    startRotation();
  }
  if (e.key === "ArrowLeft") {
    show((current - 1 + slides.length) % slides.length);
    startRotation();
  }
});
</script>
</body>
</html>
