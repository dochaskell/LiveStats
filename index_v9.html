<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Valorant Round Tracker</title>
  <style>
    :root{
      --grid-border:#111;
      --thin:#444;
      --bg:#fff;
      --muted:#666;
      --cell:24px;
      --label-col:176px;
      --font:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;
      padding:12px;
      font-family:var(--font);
      background:var(--bg);
      color:#111;
      font-size:13px;
    }
    .wrap{
      max-width:1120px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    header{
      display:flex;
      gap:10px;
      flex-wrap:nowrap;
      align-items:flex-end;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:end;
      flex:0 0 auto;
    }
    label{
      font-size:12px;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    select,input[type="text"],button{
      font:inherit;
      border:1px solid #bbb;
      border-radius:8px;
      background:#fff;
    }
    select,input[type="text"]{
      padding:6px 8px;
      min-width:170px;
      outline:none;
    }
    button{
      padding:7px 10px;
      cursor:pointer;
    }
    button:hover{border-color:#888}
    .ticker{
      position:relative;
      flex:1 1 0;
      min-width:320px;
      min-height:38px;
      border:1px solid #ddd;
      border-radius:8px;
      background:#fafafa;
      overflow:hidden;
      display:flex;
      align-items:center;
      padding:0 12px;
    }
    .ticker-line{
      position:absolute;
      left:12px;
      right:12px;
      font-size:12px;
      line-height:1.35;
      color:#333;
      font-weight:600;
      opacity:0;
      transform:translateY(100%);
      animation:tickerRotate 16s infinite;
      will-change:transform,opacity;
    }
    .ticker-line:nth-child(1){animation-delay:0s}
    .ticker-line:nth-child(2){animation-delay:4s}
    .ticker-line:nth-child(3){animation-delay:8s}
    .ticker-line:nth-child(4){animation-delay:12s}
    @keyframes tickerRotate{
      0%{opacity:0;transform:translateY(100%)}
      8%{opacity:1;transform:translateY(0)}
      25%{opacity:1;transform:translateY(0)}
      33%{opacity:0;transform:translateY(-100%)}
      100%{opacity:0;transform:translateY(-100%)}
    }
    .board{
      overflow-x:auto;
      padding-bottom:4px;
    }
    .grid{
      display:grid;
      grid-template-columns:var(--label-col) repeat(36,var(--cell));
      grid-auto-rows:var(--cell);
      width:max-content;
      border:2px solid var(--grid-border);
      border-radius:10px;
      overflow:hidden;
      background:#fff;
    }
    .cell{
      border-right:1px solid var(--thin);
      border-bottom:1px solid var(--thin);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      cursor:pointer;
      font-size:14px;
      line-height:1;
      background:#fff;
    }
    .row-label,.header-left,.header-cell,.team-box{cursor:default}
    .row-label{
      justify-content:flex-start;
      padding:0 8px;
      gap:8px;
      font-size:13px;
    }
    .row-label span,.header-left{color:var(--muted);font-size:11px}
    .header-cell,.header-left{background:#fafafa;font-size:11px}
    .header-left{justify-content:flex-start;padding-left:8px}
    .team-box{
      padding:0;
      box-shadow:inset -2px 0 0 0 var(--grid-border), inset 0 -2px 0 0 var(--grid-border);
      align-items:stretch;
      justify-content:stretch;
      background:#fff;
    }
    .team-input{
      width:100%;
      height:100%;
      border:none;
      outline:none;
      padding:0 8px;
      font:600 13px var(--font);
      background:#fff;
    }
    .main-row-cell{
      box-shadow:inset 0 -2px 0 0 var(--grid-border);
      background:#f2f2f2;
    }
    .u{text-decoration:underline;text-underline-offset:2px}
    .dot{font-size:16px}
    .stats{display:grid;gap:8px}
    .card{
      border:1px solid #ddd;
      border-radius:12px;
      padding:10px;
      background:#fff;
    }
    .card h2{margin:0 0 8px;font-size:13px}
    .statgrid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
    }
    .stat{
      border:1px solid #eee;
      border-radius:10px;
      padding:8px 10px;
      background:#fafafa;
      min-width:0;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:10px;
    }
    .stat.team-a{ background:#ffecec; grid-column: span 2; }
    .stat.team-b{ background:#ecffec; grid-column: span 2; }
    .stat .k{
      font-size:11px;
      color:var(--muted);
      line-height:1.25;
      margin:0;
      min-width:0;
    }
    .stat .v{
      font-size:16px;
      font-weight:700;
      text-align:right;
      white-space:nowrap;
    }
    @media (max-width: 900px){
      :root{--cell:22px;--label-col:150px}
      header{flex-wrap:wrap}
      .ticker{flex-basis:100%; min-width:0}
      .statgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
      select,input[type="text"]{min-width:150px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="controls">
        <label>
          Map
          <select id="mapSelect">
            <option>Bind</option>
            <option>Breeze</option>
            <option>Fracture</option>
            <option>Haven</option>
            <option>Lotus</option>
            <option>Pearl</option>
            <option>Split</option>
          </select>
        </label>
        <button id="clearBtn" type="button">Clear</button>
        <button id="swapBtn" type="button">Swap</button>
        <button id="exportBtn" type="button">Export</button>
        <button id="importBtn" type="button">Import</button>
      </div>
      <div class="ticker" aria-label="Non-negotiable reminders">
        <div class="ticker-line">Non-Negotiable: Emotional Control!</div>
        <div class="ticker-line">Non-Negotiable: No free deaths! If you swing, it's for info, trade, or space with utility.</div>
        <div class="ticker-line">Non-Negotiable: Trade rate standard. 2-man rule</div>
        <div class="ticker-line">Non-Negotiable: Utility w/Purpose: Win Space, protect Space/Time, Isolate a fight, delay, plant/defuse</div>
      </div>
    </header>

    <section class="board"><div class="grid" id="grid"></div></section>

    <section class="stats">
      <div class="card">
        <h2>Live stats</h2>
        <div class="statgrid" id="statgrid"></div>
      </div>
    </section>
  </div>

  <script>
    const ROUNDS = 36;
    const MAIN_STATES = ["", "–", "+", "X", "X", "𝕏"];
    const HIT_STATES = ["", "A", "B", "C", "?"];
    const STORAGE_KEY = "valorant_round_tracker_v3_compact";

    const model = {
      map: "Ascent",
      teams: ["Team A", "Team B"],
      main: [Array(ROUNDS).fill(0), Array(ROUNDS).fill(0)],
      dots: {
        Plant: Array(ROUNDS).fill(false),
        Eco: Array(ROUNDS).fill(false),
        Clutch: Array(ROUNDS).fill(false),
      },
      hits: Array(ROUNDS).fill(0)
    };

    const gridEl = document.getElementById("grid");
    const mapSelect = document.getElementById("mapSelect");
    const statgrid = document.getElementById("statgrid");

    function safeParseJSON(text){
      try{return JSON.parse(text)}catch{return null}
    }
    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(model));
    }
    function load(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const data = safeParseJSON(raw);
      if(!data) return;
      if(typeof data.map === "string") model.map = data.map;
      if(Array.isArray(data.teams) && data.teams.length === 2){
        model.teams = [String(data.teams[0] ?? "Team A"), String(data.teams[1] ?? "Team B")];
      }
      if(Array.isArray(data.main) && data.main.length === 2){
        for(let t=0;t<2;t++){
          if(Array.isArray(data.main[t]) && data.main[t].length === ROUNDS){
            model.main[t] = data.main[t].map(v => Number.isInteger(v) ? Math.max(0, Math.min(5, v)) : 0);
          }
        }
      }
      if(data.dots && typeof data.dots === "object"){
        for(const k of ["Plant","Eco","Clutch"]){
          if(Array.isArray(data.dots[k]) && data.dots[k].length === ROUNDS){
            model.dots[k] = data.dots[k].map(Boolean);
          }
        }
      }
      if(Array.isArray(data.hits) && data.hits.length === ROUNDS){
        model.hits = data.hits.map(v => Number.isInteger(v) ? Math.max(0, Math.min(4, v)) : 0);
      }
    }

    function countStates(arr, state){
      let c = 0;
      for(const x of arr) if(x === state) c++;
      return c;
    }
    function countDots(arr){
      let c = 0;
      for(const b of arr) if(b) c++;
      return c;
    }
    function pct(n, d){
      return d ? Math.round((n / d) * 100) + "%" : "–";
    }
    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function computeTeamStats(teamIdx){
      const a = model.main[teamIdx];
      const dash = countStates(a, 1);
      const traded = countStates(a, 2);
      const x = countStates(a, 3);
      const ux = countStates(a, 4);
      const fx = countStates(a, 5);
      const marked = dash + traded + x + ux + fx;
      return {
        dash, traded, x, ux, fx, marked,
        winRate: marked ? pct(x + ux + fx, marked) : "–",
      };
    }
    function computeUnassigned(){
      let c = 0;
      for(let i=0;i<ROUNDS;i++) if(model.main[0][i] === 0 && model.main[1][i] === 0) c++;
      return c;
    }
    function isWin(v){ return v === 3 || v === 4 || v === 5; }
    function isFirstDeath(v){ return v === 1 || v === 2; }

    function buildTeamNameCell(teamIdx){
      const wrapper = document.createElement("div");
      wrapper.className = "cell team-box main-row-cell";
      const input = document.createElement("input");
      input.type = "text";
      input.className = "team-input";
      input.value = model.teams[teamIdx];
      input.placeholder = teamIdx === 0 ? "Team A" : "Team B";
      input.addEventListener("input", e => {
        model.teams[teamIdx] = e.target.value || (teamIdx === 0 ? "Team A" : "Team B");
        renderStats();
        save();
      });
      wrapper.appendChild(input);
      return wrapper;
    }

    function buildMainCell(teamIdx, roundIdx){
      const c = document.createElement("div");
      c.className = "cell main-row-cell";
      c.dataset.kind = "main";
      c.dataset.team = String(teamIdx);
      c.dataset.round = String(roundIdx);
      c.addEventListener("click", () => {
        const cur = model.main[teamIdx][roundIdx];
        const other = 1 - teamIdx;
        const otherHasFirstDeath = isFirstDeath(model.main[other][roundIdx]);
        const next = (cur === 0 && otherHasFirstDeath) ? 3 : (cur + 1) % 6;

        if(next === 1){
          if(isFirstDeath(model.main[other][roundIdx])) model.main[other][roundIdx] = 0;
          if(model.main[other][roundIdx] === 4 || model.main[other][roundIdx] === 5) model.main[other][roundIdx] = 3;
          model.main[teamIdx][roundIdx] = 1;
        } else if(next === 2){
          // '+' should also be mutually exclusive with opponent first-death
          if(isFirstDeath(model.main[other][roundIdx])) model.main[other][roundIdx] = 0;
          if(model.main[other][roundIdx] === 4 || model.main[other][roundIdx] === 5) model.main[other][roundIdx] = 3;
          model.main[teamIdx][roundIdx] = 2;
        } else if(isWin(next)){
          model.main[teamIdx][roundIdx] = next;
          if(isWin(model.main[other][roundIdx])) model.main[other][roundIdx] = 0;
        } else {
          model.main[teamIdx][roundIdx] = 0;
        }
        render();
        save();
      });
      return c;
    }

    function buildGrid(){
      gridEl.innerHTML = "";

      const headerLeft = document.createElement("div");
      headerLeft.className = "cell header-left";
      headerLeft.textContent = "Round";
      gridEl.appendChild(headerLeft);

      for(let i=1;i<=ROUNDS;i++){
        const h = document.createElement("div");
        h.className = "cell header-cell";
        h.textContent = i;
        h.addEventListener("click", () => {
          const idx = i - 1;
          // clear both teams
          model.main[0][idx] = 0;
          model.main[1][idx] = 0;
          // clear dots
          model.dots.Plant[idx] = false;
          model.dots.Eco[idx] = false;
          model.dots.Clutch[idx] = false;
          // clear hit
          model.hits[idx] = 0;
          render();
          save();
        });
        gridEl.appendChild(h);
      }

      for(let t=0;t<2;t++){
        gridEl.appendChild(buildTeamNameCell(t));
        for(let i=0;i<ROUNDS;i++) gridEl.appendChild(buildMainCell(t, i));
      }

      for(const label of ["Hit","Plant","Eco","Clutch"]){
        const left = document.createElement("div");
        left.className = "cell row-label";
        left.innerHTML = `<b>${label}</b><span>${label === "Hit" ? "A/B/C/?" : "toggle"}</span>`;
        gridEl.appendChild(left);

        for(let i=0;i<ROUNDS;i++){
          const c = document.createElement("div");
          c.className = "cell dot";
          c.dataset.kind = "dot";
          c.dataset.label = label;
          c.dataset.round = String(i);

          if(label === "Hit"){
            c.addEventListener("click", () => {
              model.hits[i] = (model.hits[i] + 1) % 5;
              render();
              save();
            });
          } else {
            c.addEventListener("click", () => {
              model.dots[label][i] = !model.dots[label][i];
              render();
              save();
            });
          }
          gridEl.appendChild(c);
        }
      }
    }

    function attackingTeamForRound(idx){
      const r = idx + 1;
      if(r <= 12) return 0;
      if(r <= 24) return 1;
      return ((r - 25) % 2 === 0) ? 0 : 1;
    }
    function firstKillCountForTeam(teamIdx){
      let c = 0;
      for(let i=0;i<ROUNDS;i++){
        const opp = 1 - teamIdx;
        if([1,2,4,5].includes(model.main[opp][i])) c++;
      }
      return c;
    }
    function fkWins(teamIdx){
      let c = 0;
      for(let i=0;i<ROUNDS;i++){
        const hadFK = [1,2,4,5].includes(model.main[1-teamIdx][i]);
        const won = isWin(model.main[teamIdx][i]);
        if(hadFK && won) c++;
      }
      return c;
    }
    function dotWinsForTeam(dotName, teamIdx){
      let c = 0;
      for(let i=0;i<ROUNDS;i++) if(model.dots[dotName][i] && isWin(model.main[teamIdx][i])) c++;
      return c;
    }
    function joinCounts(arr){ return arr.map(String).join("/"); }
    function joinRates(winsArr, countsArr){ return winsArr.map((w,i) => countsArr[i] ? pct(w, countsArr[i]) : "–").join("/"); }

    function render(){
      mapSelect.value = model.map;
      for(const el of gridEl.querySelectorAll(".cell")){
        const kind = el.dataset.kind;
        if(kind === "main"){
          const t = Number(el.dataset.team);
          const r = Number(el.dataset.round);
          const state = model.main[t][r];
          el.textContent = MAIN_STATES[state];
          el.classList.toggle("u", state === 4);
          el.style.fontWeight = (state === 1 || state === 2) ? "700" : "600";
        } else if(kind === "dot"){
          const label = el.dataset.label;
          const r = Number(el.dataset.round);
          if(label === "Hit"){
            const v = model.hits[r] || 0;
            el.textContent = HIT_STATES[v];
            el.style.fontWeight = v ? "700" : "400";
          } else {
            const on = model.dots[label][r];
            el.textContent = on ? "•" : "";
            el.style.fontWeight = on ? "900" : "400";
          }
        }
      }
      renderStats();
    }

    function renderStats(){
      const t0 = computeTeamStats(0);
      const t1 = computeTeamStats(1);
      const unassigned = computeUnassigned();
      const plants = countDots(model.dots.Plant);
      const ecos = countDots(model.dots.Eco);
      const clutches = countDots(model.dots.Clutch);

      let winnerRounds = 0;
      for(let i=0;i<ROUNDS;i++) if(isWin(model.main[0][i]) || isWin(model.main[1][i])) winnerRounds++;

      const fk0 = firstKillCountForTeam(0);
      const fk1 = firstKillCountForTeam(1);
      const fkWins0 = fkWins(0);
      const fkWins1 = fkWins(1);
      const plantWins0 = dotWinsForTeam("Plant", 0);
      const plantWins1 = dotWinsForTeam("Plant", 1);
      const ecoWins0 = dotWinsForTeam("Eco", 0);
      const ecoWins1 = dotWinsForTeam("Eco", 1);
      const clutchWins0 = dotWinsForTeam("Clutch", 0);
      const clutchWins1 = dotWinsForTeam("Clutch", 1);

      const atkCounts = [[0,0,0],[0,0,0]];
      const atkWins = [[0,0,0],[0,0,0]];
      const defCounts = [[0,0,0],[0,0,0]];
      const defWins = [[0,0,0],[0,0,0]];

      for(let i=0;i<ROUNDS;i++){
        const hv = model.hits[i] || 0;
        if(hv >= 1 && hv <= 3){
          const site = hv - 1;
          const atk = attackingTeamForRound(i);
          const def = 1 - atk;
          atkCounts[atk][site]++;
          defCounts[def][site]++;
          if(isWin(model.main[atk][i])) atkWins[atk][site]++;
          if(isWin(model.main[def][i])) defWins[def][site]++;
        }
      }

      const aItems = [
        {k:`${model.teams[0]} win rate`, v:t0.winRate},
        {k:`${model.teams[0]} FK`, v:winnerRounds ? `${fk0}/${winnerRounds} → ${pct(fk0, winnerRounds)}` : String(fk0)},
        {k:`${model.teams[0]} FK win rate`, v:fk0 ? `${fkWins0}/${fk0} → ${pct(fkWins0, fk0)}` : "–"},
        {k:`${model.teams[0]} ATK A/B/C`, v:joinCounts(atkCounts[0])},
        {k:`${model.teams[0]} ATK win%`, v:joinRates(atkWins[0], atkCounts[0])},
      ];
      const bItems = [
        {k:`${model.teams[1]} win rate`, v:t1.winRate},
        {k:`${model.teams[1]} FK`, v:winnerRounds ? `${fk1}/${winnerRounds} → ${pct(fk1, winnerRounds)}` : String(fk1)},
        {k:`${model.teams[1]} FK win rate`, v:fk1 ? `${fkWins1}/${fk1} → ${pct(fkWins1, fk1)}` : "–"},
        {k:`${model.teams[1]} ATK A/B/C`, v:joinCounts(atkCounts[1])},
        {k:`${model.teams[1]} ATK win%`, v:joinRates(atkWins[1], atkCounts[1])},
      ];
      const items = [];
      const maxLen = Math.max(aItems.length, bItems.length);
      for(let i=0;i<maxLen;i++){
        if(aItems[i]) items.push(aItems[i]);
        if(bItems[i]) items.push(bItems[i]);
      }

      statgrid.innerHTML = "";
      for(const it of items){
        const d = document.createElement("div");
        const isA = it.k.includes(model.teams[0]);
        const isB = it.k.includes(model.teams[1]);
        d.className = "stat" + (isA ? " team-a" : isB ? " team-b" : "");
        d.innerHTML = `<div class="k">${escapeHtml(it.k)}</div><div class="v">${escapeHtml(it.v)}</div>`;
        statgrid.appendChild(d);
      }
    }

    mapSelect.addEventListener("change", () => {
      model.map = mapSelect.value;
      save();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      if(!confirm("Clear all round marks and dots?")) return;
      model.main = [Array(ROUNDS).fill(0), Array(ROUNDS).fill(0)];
      model.dots.Plant = Array(ROUNDS).fill(false);
      model.dots.Eco = Array(ROUNDS).fill(false);
      model.dots.Clutch = Array(ROUNDS).fill(false);
      model.hits = Array(ROUNDS).fill(0);
      render();
      save();
    });
    document.getElementById("swapBtn").addEventListener("click", () => {
      [model.teams[0], model.teams[1]] = [model.teams[1], model.teams[0]];
      [model.main[0], model.main[1]] = [model.main[1], model.main[0]];
      render();
      save();
    });
    document.getElementById("exportBtn").addEventListener("click", async () => {
      const payload = JSON.stringify(model, null, 2);
      try{
        await navigator.clipboard.writeText(payload);
        alert("Copied JSON to clipboard.");
      } catch {
        prompt("Copy JSON:", payload);
      }
    });
    document.getElementById("importBtn").addEventListener("click", () => {
      const txt = prompt("Paste previously exported JSON:");
      if(!txt) return;
      const data = safeParseJSON(txt);
      if(!data){ alert("That wasn't valid JSON."); return; }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      load();
      buildGrid();
      render();
      save();
    });

    load();
    buildGrid();
    render();
  </script>
</body>
</html>
